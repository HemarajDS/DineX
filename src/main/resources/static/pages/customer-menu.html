<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Menu | NoirTable RMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="guestHeroBar"></div>

<main class="page-shell page-shell--guest">
    <div class="container-fluid guest-shell">
        <div id="messageBox"></div>

        <section class="hero-panel hero-panel--guest mb-4">
            <div class="row g-4 align-items-center">
                <div class="col-xl-8">
                    <span class="eyebrow">QR dining menu</span>
                    <h1 class="hero-title mt-3">Browse the menu for your table</h1>
                    <p class="hero-copy mb-0">A compact guest menu with only currently available dishes. Scan, browse, and choose what you want without back-office clutter.</p>
                </div>
                <div class="col-xl-4">
                    <div class="customer-quick-grid">
                        <div class="mini-stat">
                            <div class="mini-stat__label">Table</div>
                            <div class="mini-stat__value" id="guestTableLabel">-</div>
                        </div>
                        <div class="mini-stat">
                            <div class="mini-stat__label">Available Items</div>
                            <div class="mini-stat__value" id="guestMenuCount">0</div>
                        </div>
                        <div class="mini-stat">
                            <div class="mini-stat__label">Dining Mode</div>
                            <div class="mini-stat__value">Dine In</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="guest-filter-bar mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-lg-3 col-md-6">
                    <label class="form-label">Table Number</label>
                    <input type="text" id="guestTableNumber" class="form-control form-control-lg" placeholder="T-04">
                </div>
                <div class="col-lg-3 col-md-6">
                    <label class="form-label">Category</label>
                    <select id="guestCategoryFilter" class="form-select form-select-lg">
                        <option value="">All categories</option>
                    </select>
                </div>
                <div class="col-lg-6">
                    <label class="form-label">Search</label>
                    <input type="text" id="guestSearchFilter" class="form-control form-control-lg" placeholder="Search dishes, drinks, desserts">
                </div>
            </div>
        </section>

        <section class="guest-content">
            <div class="table-card table-card--elevated guest-catalog-card">
                <div class="panel-header mb-4">
                    <div>
                        <div class="eyebrow">Available now</div>
                        <h3 class="section-title mb-0">Customer menu</h3>
                    </div>
                    <div class="guest-meta-note">Only live menu items are shown here.</div>
                </div>
                <div class="menu-grid menu-grid--customer" id="guestMenuCatalog"></div>
            </div>
        </section>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/customer-menu.js"></script>
</body>
</html>
