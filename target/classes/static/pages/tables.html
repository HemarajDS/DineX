<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables | NoirTable RMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="appNavbar"></div>

<main class="page-shell">
    <div class="container">
        <div id="messageBox"></div>
        <section class="hero-panel hero-panel--compact mb-4">
            <div class="row g-4 align-items-center">
                <div class="col-lg-8">
                    <span class="eyebrow">Floor operations</span>
                    <h1 class="hero-title mt-3">Tables and assigned service zones</h1>
                    <p class="hero-copy mb-0">Waiters can focus on assigned tables while admin and cashier monitor the whole dining floor.</p>
                </div>
            </div>
        </section>

        <div class="row g-4">
            <div class="col-xl-4">
                <div class="table-card table-card--elevated p-4" id="tableFormPanel">
                    <div class="panel-header mb-3">
                        <div>
                            <div class="eyebrow" id="tableFormMode">Admin tools</div>
                            <h3 class="section-title mb-0" id="tableFormTitle">Create Table</h3>
                        </div>
                    </div>
                    <form id="tableForm">
                        <div class="mb-3">
                            <label class="form-label">Table Number</label>
                            <input type="text" id="tableNumberInput" class="form-control form-control-lg" placeholder="T-07">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Capacity</label>
                            <input type="number" id="tableCapacityInput" class="form-control form-control-lg" min="1" value="4">
                        </div>
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" role="switch" id="tableOccupiedInput">
                            <label class="form-check-label" for="tableOccupiedInput">Occupied</label>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark rounded-pill px-4 w-100" id="tableSubmitButton">Create Table</button>
                            <button type="button" class="btn btn-outline-dark rounded-pill px-4 hidden" id="cancelTableEditButton">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-xl-8">
                <div class="table-card table-card--elevated p-4 mb-4">
                    <div class="panel-header">
                        <div>
                            <div class="eyebrow">Table cards</div>
                            <h3 class="section-title mb-0">Floor snapshot</h3>
                        </div>
                    </div>
                    <div class="table-floor" id="tableFloor"></div>
                </div>

                <div class="table-card table-card--elevated p-4">
                    <div class="panel-header">
                        <div>
                            <div class="eyebrow">Master registry</div>
                            <h3 class="section-title mb-0">Table management list</h3>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle modern-table">
                            <thead>
                            <tr>
                                <th>Table</th>
                                <th>Capacity</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody id="tableListBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/tables.js"></script>
</body>
</html>
